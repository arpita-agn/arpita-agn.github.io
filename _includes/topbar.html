<header class="topbar">
  <div class="topbar-inner">
    <a href="{{ site.baseurl }}/" class="topbar-name">{{ site.author.name }}</a>
    <nav class="topbar-nav">
      {% for link in site.data.navigation.main %}
        <a href="{{ site.baseurl }}{{ link.url }}"{% if page.url == link.url %} class="active"{% endif %}>{{ link.title }}</a>
      {% endfor %}
    </nav>
    <button class="menu-toggle" onclick="document.querySelector('.topbar-nav').classList.toggle('open')">
      <i class="fas fa-bars"></i>
    </button>
  </div>
</header>
